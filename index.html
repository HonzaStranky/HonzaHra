<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honza3D | Ultimate Empire Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden;
            height: 100vh;
        }
        h1, .font-money { font-family: 'Orbitron', sans-serif; }
        
        @keyframes ripple {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(249, 115, 22, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }
        .printer-ripple { animation: ripple 0.3s ease-out; }
        /* Toto zajistí, že se ti na mobilu nebude označovat text při držení tlačítka */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Ale pro vstupy (pokud nějaké máš, např. jméno) to chceme nechat */
        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        /* Oprava pozice modálního okna pro mobil */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999; /* Musí být nejvýše */
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.9);
        }
        /* Fix pro scrollování upgradů */
        .upgrade-container {
            height: calc(100vh - 460px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }
        
        @media (max-width: 768px) {
            .upgrade-container { height: calc(100vh - 530px); }
        }
        /* Design tiskárny */
        .printer-btn { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 2px solid rgba(249, 115, 22, 0.3); 
            box-shadow: 0 0 40px rgba(249, 115, 22, 0.15);
            transition: all 0.1s ease; 
            touch-action: manipulation;
            position: relative;
        }
        .printer-btn:active { transform: scale(0.92); }
        .printer-btn:hover { box-shadow: 0 0 60px rgba(249, 115, 22, 0.25); border-color: rgba(249, 115, 22, 0.5); }

        /* Karty upgradů */
        .upgrade-card { 
            background: rgba(15, 23, 42, 0.6); 
            border-left: 4px solid transparent; 
            margin-bottom: 8px; 
            transition: 0.2s; 
        }
        .upgrade-click { border-left-color: #f97316; }
        .upgrade-auto { border-left-color: #3b82f6; }
        
        /* Rebirth efekt */
        .rebirth-ready { 
            animation: neonPulse 1.5s infinite alternate; 
            background: linear-gradient(135deg, #7e22ce 0%, #a855f7 100%) !important; 
            color: white !important; 
        }
        @keyframes neonPulse { from { box-shadow: 0 0 10px #a855f7; } to { box-shadow: 0 0 25px #d8b4fe; } }

        /* Modální okna */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; backdrop-filter: blur(5px); }
        
        .tab-btn { opacity: 0.5; border-bottom: 2px solid transparent; transition: 0.3s; padding: 10px 5px; }
        .tab-btn.active { opacity: 1; border-color: #f97316; color: #f97316; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        /* Létající čísla (OOMPH) */
        .money-particle {
            position: absolute;
            pointer-events: none;
            color: #f97316;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            animation: flyUp 1.2s ease-out forwards;
            text-shadow: 0 0 5px rgba(249, 115, 22, 0.8), 0 0 10px rgba(249, 115, 22, 0.5);
            z-index: 100;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.2); opacity: 0; }
        }
    </style>
</head>

            <h1 class="text-5xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-b from-orange-400 to-orange-700 italic mb-4">Honza3D</h1>

            <button id="printer-main" onclick="handlePrint(event)" class="printer-btn w-36 h-36 md:w-64 md:h-64 rounded-[2.5rem] flex items-center justify-center mb-4">

                <div class="flex gap-2 justify-center text-[10px] md:text-sm">
                    <span class="text-blue-400 font-bold bg-blue-900/20 px-3 py-1 rounded border border-blue-500/20" id="speed">0 Kč/s</span>
                    <span class="text-orange-400 font-bold bg-orange-900/20 px-3 py-1 rounded border border-orange-500/20" id="power">1 Kč/klik</span>

                <h2 class="text-lg font-black uppercase text-orange-500 italic">Upgrady</h2>
                <span id="player-display" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest"></span>

            <div id="upgrade-list" class="upgrade-container p-4"></div>
            
            <div class="p-4 bg-slate-900 border-t border-white/10 mt-auto shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
                <div class="bg-black/40 p-3 rounded-lg border border-white/5 mb-3">
                    <div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase mb-1">
                        <span>Progress k Rebirthu</span>
                        <span id="progress-percent" class="text-orange-500">0%</span>
                    </div>
                    <div class="h-1.5 bg-black/60 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-orange-500 transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
                <button onclick="doRebirth()" id="rebirth-btn" class="w-full bg-slate-800 p-4 rounded-xl font-black opacity-50 uppercase text-sm transition-all text-slate-500 flex flex-col items-center">

    <script>
        const BIN_ID = "69b2c797b7ec241ddc61e402";
        const MASTER_KEY = "$2a$10$p9H9.IwZd4RwszyzR8Ojke.IrWVwKXcn6cXbF141uUazU.Lr1ZViW";
        const SERVER_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let money = 0, multiplier = 1.0, rebirthPrice = 100000000000, clickPower = 1, incomePerSecond = 0;
        let currentLdbTab = 'rebirths';
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const platform = isMobile ? "Mobil" : "PC";

        const suffixes = ["", "k", "M", "B", "T", "Q", "S", "N", "D", "U", "V", "G"];
        const manualCosts = ['15', '100', '1k', '5k', '25k', '100k', '500k', '2m', '10m', '50m', '250m', '1b', '5b', '25b', '100b', '500b', '2t', '10t', '50t', '250t', '1q', '5q', '25q', '100q', '500q', '2s', '10s', '50s', '250s', '1n', '5n', '25n', '100n', '500n', '2d', '10d', '50d', '250d', '1u', '5u', '25u', '100u', '500u', '1v', '10v', '100v', '1g', '10g', '100g', '1000g'];
        const upgradeNames = ["Starý Ender", "Tryska 0.4mm", "Lepidlo", "Ocel tryska", "Bambu Lab", "Safír hrot", "Plech Průša", "Titan Heatbreak", "Resin bazén", "Laser měření", "Panelák farma", "Vulkan tryska", "Al extrudér", "Diamant hrot", "Voron", "Voda chlazení", "Hala Brno", "Ultra tryska", "Robot rám", "Karbid tryska", "Křemík pec", "Plazma extr.", "Cloud server", "Nukleární teplo", "USA pobočka", "Molekul tryska", "Nano linka", "Antihmota", "Měsíční těžba", "Gravit měnič", "Mars Kolonie", "Časová smyčka", "Orbital stanice", "Kvant extr.", "Saturn prstence", "Neutron tryska", "Mezigalaktik", "Temná hmota", "Dyson sféra", "Hologram", "Vládce soustavy", "Singularita", "Tkadlec", "Bůh tryska", "Honza3D Bůh", "Nekonečno", "Konec vesmíru", "Nová dimenze", "Matrix", "Master Model"];

        function parseShortNumber(val) {
            val = val.toLowerCase(); const num = parseFloat(val);
            if (val.includes('k')) return num * 1e3; if (val.includes('m')) return num * 1e6;
            if (val.includes('b')) return num * 1e9; if (val.includes('t')) return num * 1e12;
            if (val.includes('q')) return num * 1e15; if (val.includes('s')) return num * 1e18;
            if (val.includes('n')) return num * 1e21; if (val.includes('d')) return num * 1e24;
            if (val.includes('u')) return num * 1e27; if (val.includes('v')) return num * 1e30;
            if (val.includes('g')) return num * 1e33; return num;
        }

        const upgrades = upgradeNames.map((name, i) => ({
            id: i, name, cost: parseShortNumber(manualCosts[i]), value: parseShortNumber(manualCosts[i]) / 8,
            type: i % 2 !== 0 ? 'click' : 'auto', icon: i % 2 !== 0 ? "⚡" : "📦", count: 0
        }));

        function formatMoney(num) {
            if (num < 1000) return Math.floor(num) + " Kč";
            const exp = Math.floor(Math.log10(num) / 3);
            return (num / Math.pow(1000, exp)).toLocaleString('cs-CZ', {maximumFractionDigits: 1}) + " " + (suffixes[exp] || "e"+exp*3);
        }

        // --- CLOUD SYNC & LEADERBOARD ---
async function syncWithServer() {
    const pName = localStorage.getItem('honza3D_name');
    
    // Ochrana: Pokud jméno chybí nebo je to výchozí "Hráč", nesynchronizujeme
    if (!pName || pName.toLowerCase().startsWith("hráč")) return;

    try {
        // 1. Získání aktuálních dat ze serveru
        const getRes = await fetch(`${SERVER_URL}/latest`, { 
            headers: { "X-Master-Key": MASTER_KEY } 
        });
        const responseData = await getRes.json();
        
        // Zajistíme, že players je pole
        let players = responseData.record.players || [];

        // 2. Příprava tvých aktuálních dat
        const rbCount = Math.max(0, Math.round((multiplier - 1))); // Výpočet rebirthů (pokud máš +0.2 za jeden)
        const myData = { 
            name: pName, 
            rebirths: rbCount, 
            money: Math.floor(money), 
            platform: typeof platform !== 'undefined' ? platform : "Web", 
            lastSeen: Date.now() 
        };

        async function changeName() {
            const oldName = localStorage.getItem('honza3D_name');
            const newName = prompt("Zadej své nové jméno:", oldName || "");
        
            // Pokud hrac dal Cancel nebo nic nenapsal, nic nemeň
            if (newName === null || newName.trim() === "" || newName === oldName) return;
        
            // 1. OKAMŽITÉ SMAZÁNÍ STARÉHO JMÉNA ZE SERVERU
            if (oldName && !oldName.toLowerCase().startsWith("hráč")) {
                try {
                    // Nejdříve stáhneme aktuální seznam
                    const getRes = await fetch(`${SERVER_URL}/latest`, { headers: { "X-Master-Key": MASTER_KEY } });
                    const responseData = await getRes.json();
                    let players = responseData.record.players || [];
        
                    // Vyfiltrujeme pryč staré jméno (smažeme ho ze seznamu)
                    players = players.filter(p => p.name.toLowerCase() !== oldName.toLowerCase());
        
                    // Nahrajeme čistý seznam zpět na server (bez starého jména)
                    await fetch(SERVER_URL, {
                        method: 'PUT',
                        headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                        body: JSON.stringify({ players: players })
                    });
                    
                    console.log("Staré jméno smazáno z cloudu.");
                } catch (e) {
                    console.error("Nepodařilo se smazat staré jméno:", e);
                    alert("Chyba spojení se serverem. Zkus to za chvíli.");
                    return; // Pokud se smazání nepovedlo, nepokračujeme, aby nevznikla duplicita
                }
            }

                // 2. NASTAVENÍ NOVÉHO JMÉNA
                localStorage.setItem('honza3D_name', newName.trim());
                
                // 3. OKAMŽITÁ SYNCHRONIZACE NOVÉHO JMÉNA
                // Tím se nové jméno hned zapíše do cloudu s aktuálními penězi
                await syncWithServer();
                
                alert("Jméno změněno na: " + newName);
                if(typeof renderLeaderboard === "function") renderLeaderboard(); // Aktualizuj tabulku, pokud tu funkci máš
            }
        // 4. ÚKLID SEZNAMU
        // Seřadíme hráče (primárně podle rebirthů, sekundárně podle peněz)
        players.sort((a, b) => {
            if (b.rebirths !== a.rebirths) return b.rebirths - a.rebirths;
            return b.money - a.money;
        });

        // Ořízneme seznam na top 100, aby se bin nepřeplnil
        const cleanPlayers = players.slice(0, 100);

        // 5. Odeslání vyčištěných dat zpět na server
        await fetch(SERVER_URL, {
            method: 'PUT',
            headers: { 
                "Content-Type": "application/json", 
                "X-Master-Key": MASTER_KEY 
            },
            body: JSON.stringify({ players: cleanPlayers })
        });

        // 6. Aktualizace stavu v UI
        const syncStatus = document.getElementById('sync-status');
        if (syncStatus) {
            syncStatus.innerText = "✅ CLOUD SYNCHRONIZOVÁN";
            syncStatus.classList.remove('text-red-500');
            syncStatus.classList.add('text-green-500');
            
            // Po 3 sekundách text zmizí nebo se změní
            setTimeout(() => { syncStatus.innerText = ""; }, 3000);
        }

    } catch (e) {
        console.error("Chyba při synchronizaci:", e);
        const syncStatus = document.getElementById('sync-status');
        if (syncStatus) {
            syncStatus.innerText = "❌ CHYBA SYNCHRONIZACE";
            syncStatus.classList.add('text-red-500');
        }
    }
}

        async function changeNamePrompt() {
            const oldName = localStorage.getItem('honza3D_name');
            const newName = prompt("Zadej nové jméno (3-15 znaků):", oldName);
            
            if (newName && newName.length >= 3 && newName.length <= 15 && !newName.toLowerCase().startsWith("hráč") && newName !== oldName) {
                const status = document.getElementById('sync-status');
                if(status) status.innerText = "🔄 MAŽU STARÉ JMÉNO...";

                try {
                    const getRes = await fetch(`${SERVER_URL}/latest`, { headers: { "X-Master-Key": MASTER_KEY } });
                    const responseData = await getRes.json();
                    let players = (responseData.record.players || []).filter(p => p.name !== oldName && p.name !== newName);
                    
                    localStorage.setItem('honza3D_name', newName);
                    const rbCount = Math.round(multiplier - 1);
                    players.push({ name: newName, rebirths: rbCount, money: Math.floor(money), platform: platform, lastSeen: Date.now() });

                    await fetch(SERVER_URL, {
                        method: 'PUT',
                        headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                        body: JSON.stringify({ players: players.slice(0, 100) })
                    });
                    
                    updateUI();
                    updateLeaderboardUI();
                    if(status) status.innerText = "✅ JMÉNO ZMĚNĚNO";
                } catch (e) {
                    alert("Chyba při komunikaci s cloudem.");
                }
            }
        }

        function setLdbTab(tab) {
            currentLdbTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            updateLeaderboardUI();
        }

        async function updateLeaderboardUI() {
            const container = document.getElementById('leaderboard-content');
            const pName = localStorage.getItem('honza3D_name');
            document.getElementById('current-name-display').innerText = pName || "---";
            container.innerHTML = "<div class='text-center py-20 opacity-50 animate-pulse text-xs uppercase tracking-widest'>Stahuji žebříček...</div>";
            
            try {
                const res = await fetch(`${SERVER_URL}/latest?nocache=${Date.now()}`, { headers: { "X-Master-Key": MASTER_KEY } });
                const data = await res.json();
                let players = data.record.players || [];
                
                if (currentLdbTab === 'rebirths') players.sort((a,b) => b.rebirths - a.rebirths);
                else if (currentLdbTab === 'money') players.sort((a,b) => b.money - a.money);
                else if (currentLdbTab === 'platform') players = players.filter(p => p.platform === platform).sort((a,b) => b.rebirths - a.rebirths);

                container.innerHTML = players.slice(0, 50).map((p, i) => `
                    <div class="flex justify-between items-center p-3 ${p.name === pName ? 'bg-orange-500/20 border border-orange-500 shadow-[0_0_15px_rgba(249,115,22,0.2)]' : (i < 3 ? 'bg-orange-500/5 border border-white/5' : 'bg-white/5')} rounded-xl transition-all">
                        <div class="flex items-center gap-3">
                            <span class="font-black ${i < 3 ? 'text-orange-500' : 'text-slate-600'} w-4">${i+1}.</span>
                            <div class="flex flex-col">
                                <span class="font-bold text-sm tracking-wide">${p.name} ${p.platform === 'Mobil' ? '📱' : '💻'}</span>
                                <span class="text-[8px] opacity-40 uppercase font-bold tracking-widest">${p.platform || 'Neznámé'}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="font-black text-orange-400 text-xs">${p.rebirths} RB</div>
                            <div class="text-[9px] opacity-60 font-money">${formatMoney(p.money || 0)}</div>
                        </div>
                    </div>`).join('');
            } catch(e) { container.innerHTML = "<div class='text-red-500 text-center py-10'>Offline žebříček</div>"; }
        }

        // --- HERNÍ MECHANIKY ---
        function createMoneyParticle(e) {
            const particle = document.createElement('div');
            particle.classList.add('money-particle');
            const amount = formatMoney(clickPower * multiplier);
            particle.innerText = "+" + amount;
            
            // Pozice kliku (podpora mobilů i PC)
            const x = e.clientX || (e.touches ? e.touches[0].clientX : window.innerWidth / 2);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : window.innerHeight / 2);
            
            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;
            
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 1200);
        }

        function handlePrint(e) { 
            money += clickPower * multiplier; 
            createMoneyParticle(e);
            
            // Animace tlačítka
            const btn = document.getElementById('printer-main');
            btn.classList.remove('printer-ripple');
            void btn.offsetWidth; // Reset animace
            btn.classList.add('printer-ripple');

            updateUI(); 
            saveGame(); 
        }
        
        function buyMax(idx) {
            const u = upgrades[idx];
            let count = 0;
            
            // Dokud máš peníze na další kus, kupuj
            while (money >= u.cost) {
                money -= u.cost;
                u.count++;
                
                // Aktualizace výkonu (stejná logika jako v buyUpgrade)
                if (u.type === 'auto') {
                    incomePerSecond += u.value;
                } else {
                    clickPower += u.value;
                }
                
                // Cena se u tvých upgradů zatím nemění, 
                // ale pokud bys v budoucnu chtěl zdražování, 
                // tady by se u.cost přepočítala.
                count++;
            }
            
            if (count > 0) {
                updateUI();
                saveGame();
                // Malá vizuální odezva
                const card = document.getElementById(`upg-${idx}`);
                card.style.transform = "scale(1.05)";
                setTimeout(() => card.style.transform = "scale(1)", 100);
            }
        }

        function toggleFS() { 
            if (!document.fullscreenElement) document.documentElement.requestFullscreen(); 
            else document.exitFullscreen(); 
        }

        function openLeaderboard() { 
            document.getElementById('leaderboard-modal').style.display = 'flex'; 
            updateLeaderboardUI(); 
            syncWithServer();
        }

        function closeLeaderboard() { 
            document.getElementById('leaderboard-modal').style.display = 'none'; 
        }

        function doRebirth() {
            if (money >= rebirthPrice) {
                multiplier += 1.0; 
                money = 0; 
                incomePerSecond = 0; 
                clickPower = 1;
                rebirthPrice *= 5; 
                upgrades.forEach(u => u.count = 0);
                renderList(); 
                updateUI(); 
                saveGame(); 
                syncWithServer();
            }
        }

        function updateUI() {
            // 1. Získání jména (bez promptu, ten měj jinde)
            const pName = localStorage.getItem('honza3D_name') || "Hráč";
            const display = document.getElementById('player-display');
            if (display) display.innerText = pName + " [" + platform + "]";

            // 2. Peníze a statistiky
            document.getElementById('money').innerText = formatMoney(money);
            document.getElementById('speed').innerText = formatMoney(incomePerSecond * multiplier) + "/s";
            document.getElementById('power').innerText = formatMoney(clickPower * multiplier) + "/klik";
            
            // 3. Rebirth sekce
            document.getElementById('rebirth-badge').innerText = multiplier.toFixed(1) + "x MULTIPLIER";
            document.getElementById('rebirth-price-tag').innerText = "Cena: " + formatMoney(rebirthPrice);
            
            const prog = Math.min((money / rebirthPrice) * 100, 100);
            document.getElementById('progress-bar').style.width = prog + "%";
            document.getElementById('progress-percent').innerText = Math.floor(prog) + "%";
            
            // 4. Stav Rebirth tlačítka
            const btn = document.getElementById('rebirth-btn');
            if (money >= rebirthPrice) {
                btn.classList.add('rebirth-ready');
                btn.style.opacity = "1";
                btn.style.cursor = "pointer";
            } else {
                btn.classList.remove('rebirth-ready');
                btn.style.opacity = "0.5";
                btn.style.cursor = "not-allowed";
            }
            
            // 5. Průhlednost upgradů
            upgrades.forEach((u, i) => {
                const card = document.getElementById(`upg-${i}`);
                if (card) {
                    card.style.opacity = money >= u.cost ? "1" : "0.3";
                    // Bonus: změníme barvu ceny na červenou, když na to nemá
                    const priceTag = card.querySelector('.text-orange-400');
                    if (priceTag) priceTag.style.color = money >= u.cost ? "#fb923c" : "#ef4444";
                }
            });
        }

        
        function renderList() {
            document.getElementById('upgrade-list').innerHTML = upgrades.map((u, i) => `
                <div 
                    id="upg-${i}" 
                    class="upgrade-card ${u.type === 'click' ? 'upgrade-click' : 'upgrade-auto'} p-3 rounded-xl flex justify-between items-center cursor-pointer select-none mb-2"
                    onmousedown="startTurbo(${i})" 
                    onmouseup="stopTurbo()" 
                    onmouseleave="stopTurbo()"
                    ontouchstart="startTurbo(${i})" 
                    ontouchend="stopTurbo()"
                >
                    <div class="flex gap-3 items-center">
                        <span class="text-2xl">${u.icon}</span>
                        <div>
                            <div class="font-bold text-[11px] uppercase">${u.name}</div>
                            <div class="text-[9px] opacity-60">+${formatMoney(u.value)} ${u.type === 'click' ? '/klik' : '/s'}</div>
                        </div>
                    </div>
                    
                    <div class="flex flex-col items-end gap-1">
                        <div class="font-black text-[11px] text-orange-400 font-money">${formatMoney(u.cost)}</div>
                        <button 
                            onclick="event.stopPropagation(); buyMax(${i})" 
                            class="bg-white/10 hover:bg-white/20 px-2 py-0.5 rounded text-[8px] font-bold uppercase border border-white/5"
                        >
                            Max
                        </button>
                    </div>
                </div>`).join('');
        }

        function buyUpgrade(idx) {
            const u = upgrades[idx];
            if (money >= u.cost) { 
                money -= u.cost; 
                u.count++; 
                if(u.type === 'auto') incomePerSecond += u.value; 
                else clickPower += u.value; 
                updateUI(); 
                saveGame(); 
            }
        }

let turboInterval = null;
let turboDelayTimeout = null;

function startTurbo(idx) {
    // 1. Nejdřív koupíme jeden hned při kliknutí
    buyUpgrade(idx);

    // 2. Nastavíme prodlevu 2 sekundy, než začne "kulomet"
    turboDelayTimeout = setTimeout(() => {
        // 3. Po 2 sekundách spustíme interval každých 100ms (0.1s)
        turboInterval = setInterval(() => {
            const u = upgrades[idx];
            if (money >= u.cost) {
                buyUpgrade(idx);
            } else {
                stopTurbo(); // Pokud dojdou peníze, zastavíme to
            }
        }, 100);
    }, 2000);
}

function stopTurbo() {
    // Vyčistíme oba časovače, aby nákup nepokračoval
    clearTimeout(turboDelayTimeout);
    clearInterval(turboInterval);
}

let isSpinning = false;
let moneyMultiplierActive = false;

function openWheel() {
    const modal = document.getElementById('wheel-modal');
    if (modal) {
        modal.style.setProperty('display', 'flex', 'important');
        checkWheelTimer();
    } else {
        console.error("Modální okno 'wheel-modal' nebylo nalezeno!");
    }
}

function closeWheel() {
    if (!isSpinning) document.getElementById('wheel-modal').style.display = 'none';
}

function checkWheelTimer() {
    const lastSpin = localStorage.getItem('honza3D_lastSpin') || 0;
    const now = Date.now();
    const waitTime = 12 * 60 * 60 * 1000; // 12 hodin v ms
    const timeLeft = waitTime - (now - lastSpin);
    const btn = document.getElementById('spin-btn');
    const timerDisp = document.getElementById('wheel-timer');

    if (timeLeft > 0) {
        btn.style.display = 'none';
        timerDisp.classList.remove('hidden');
        const hours = Math.floor(timeLeft / (1000 * 60 * 60));
        const mins = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
        timerDisp.innerText = `Další zatočení za: ${hours}h ${mins}m`;
    } else {
        btn.style.display = 'block';
        timerDisp.classList.add('hidden');
    }
}

async function spinWheel() {
    if (isSpinning) return;
    isSpinning = true;
    
    const btn = document.getElementById('spin-btn');
    const display = document.getElementById('wheel-display');
    btn.style.opacity = "0.5";
    btn.innerText = "Točím...";

    // Efekt točení
    display.style.transition = "all 4s cubic-bezier(0.15, 0, 0.15, 1)";
    const randomDeg = 1800 + Math.random() * 1000;
    display.style.transform = `rotate(${randomDeg}deg)`;

    setTimeout(() => {
        const rewards = [
            { name: "2 Rebirthy", action: () => { multiplier += 2; } },
            { name: "1 V peněz", action: () => { money += 1e30; } },
            { name: "5x víc peněz", action: () => { money *= 5; } },
            { name: "1 Rebirth", action: () => { multiplier += 1; } },
            { name: "100x Money (10m)", action: () => { activate100xBoost(); } }
        ];

        const win = rewards[Math.floor(Math.random() * rewards.length)];
        
        // Uložení času
        localStorage.setItem('honza3D_lastSpin', Date.now());
        
        // Provedení akce
        win.action();
        
        alert("GRATULACE! Vyhrál jsi: " + win.name);
        
        isSpinning = false;
        display.style.transform = "rotate(0deg)";
        display.style.transition = "none";
        
        updateUI();
        saveGame();
        checkWheelTimer();
        syncWithServer();
    }, 4000);
}

function activate100xBoost() {
    const originalMult = multiplier;
    multiplier *= 100;
    updateUI();
    
    // Vizuální efekt
    document.body.style.boxShadow = "inset 0 0 100px rgba(249, 115, 22, 0.5)";
    
    setTimeout(() => {
        multiplier /= 100;
        document.body.style.boxShadow = "none";
        updateUI();
        alert("100x Boost vypršel!");
    }, 10 * 60 * 1000); // 10 minut
}
        function saveGame() { 
            const data = { money, multiplier, rebirthPrice, counts: upgrades.map(u => u.count) }; 
            localStorage.setItem('honza3D_save', JSON.stringify(data)); 
        }

        function loadGame() {
            const saved = localStorage.getItem('honza3D_save');
            if (saved) {
                const d = JSON.parse(saved); 
                money = d.money || 0; 
                multiplier = d.multiplier || 1.0; 
                rebirthPrice = d.rebirthPrice || 100000000000;
                incomePerSecond = 0; clickPower = 1;
                if(d.counts) {
                    d.counts.forEach((c, i) => { 
                        if(upgrades[i]) { 
                            upgrades[i].count = c; 
                            if (upgrades[i].type === 'auto') incomePerSecond += c * upgrades[i].value; 
                            else clickPower += c * upgrades[i].value; 
                        }
                    });
                }
            }
            renderList(); updateUI();
        }

// --- SMYČKY & START ---
        
        // 1. Kontrola jména PŘED startem (jen jednou)
        let savedName = localStorage.getItem('honza3D_name');
        if (!savedName || savedName.toLowerCase().startsWith("hráč")) {
            savedName = prompt("Vítej v Honza3D! Jak se bude jmenovat tvé impérium?") || "Hráč" + Math.floor(Math.random()*1000);
            localStorage.setItem('honza3D_name', savedName);
        }

        // 2. Hlavní smyčka pro automatický příjem (10x za sekundu)
        setInterval(() => { 
            if (incomePerSecond > 0) { 
                money += (incomePerSecond * multiplier) / 10; 
                updateUI(); 
            } 
        }, 100);

        // 3. Cloud sync každou minutu
        setInterval(syncWithServer, 60000); 

        // 4. Funkce pro vizuální efekt tiskárny (přidej do handlePrint)
        function animatePrinter() {
            const btn = document.getElementById('printer-main');
            if (!btn) return;
            
            // Přidáme třídu pro animaci
            btn.style.transform = "scale(0.95)";
            btn.style.borderColor = "rgba(249, 115, 22, 0.8)";
            
            // Po 100ms vrátíme zpět
            setTimeout(() => {
                btn.style.transform = "scale(1)";
                btn.style.borderColor = "rgba(249, 115, 22, 0.3)";
            }, 100);
        }

        // Upravíme tvůj handlePrint, aby volal tu animaci
        const originalHandlePrint = handlePrint;
        handlePrint = function(e) {
            animatePrinter();
            originalHandlePrint(e);
        };

        // 5. NAČTENÍ HRY
        loadGame();
    </script>
</body>
</html>
