<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honza3D | Ultimate Empire Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden;
            height: 100vh;
        }
        h1, .font-money { font-family: 'Orbitron', sans-serif; }
        
        .upgrade-container {
            height: calc(100vh - 460px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }
        
        @media (max-width: 768px) {
            .upgrade-container { height: calc(100vh - 530px); }
        }

        .printer-btn { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 2px solid rgba(249, 115, 22, 0.3); 
            box-shadow: 0 0 40px rgba(249, 115, 22, 0.15);
            transition: all 0.1s ease; 
            touch-action: manipulation;
        }
        .printer-btn:active { transform: scale(0.9); }

        .upgrade-card { background: rgba(15, 23, 42, 0.6); border-left: 4px solid transparent; margin-bottom: 8px; transition: 0.2s; }
        .upgrade-click { border-left-color: #f97316; }
        .upgrade-auto { border-left-color: #3b82f6; }
        
        .rebirth-ready { 
            animation: neonPulse 1.5s infinite alternate; 
            background: linear-gradient(135deg, #7e22ce 0%, #a855f7 100%) !important; 
            color: white !important; 
        }
        @keyframes neonPulse { from { box-shadow: 0 0 10px #a855f7; } to { box-shadow: 0 0 25px #d8b4fe; } }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; backdrop-filter: blur(5px); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200 select-none">

    <div id="leaderboard-modal" class="modal items-center justify-center p-4">
        <div class="bg-slate-900 border border-orange-500/30 w-full max-w-md rounded-2xl p-6 relative flex flex-col">
            <button onclick="closeLeaderboard()" class="absolute top-4 right-4 text-slate-500 text-2xl">✕</button>
            <h2 class="text-xl font-black text-orange-500 text-center uppercase mb-4 tracking-widest italic">SÍŤOVÝ ŽEBŘÍČEK</h2>
            
            <div id="leaderboard-content" class="space-y-2 max-h-[50vh] overflow-y-auto pr-2 mb-4"></div>
            
            <div class="border-t border-white/10 pt-4 mt-auto">
                <div class="flex flex-col items-center gap-2">
                    <div class="text-[10px] text-slate-500 uppercase font-bold">Tvoje identita</div>
                    <div id="current-name-display" class="font-bold text-orange-400">---</div>
                    <button onclick="changeNamePrompt()" class="bg-white/5 hover:bg-white/10 px-4 py-2 rounded-lg text-[10px] uppercase font-bold transition-all border border-white/10">
                        Změnit jméno ✏️
                    </button>
                </div>
            </div>

            <div id="sync-status" class="text-[9px] text-center mt-4 text-slate-600 uppercase tracking-widest">Status: Připraven</div>
        </div>
    </div>

    <div class="flex flex-col md:flex-row h-screen">
        <div class="w-full md:flex-grow flex flex-col items-center justify-center p-4 relative h-[45%] md:h-full">
            <div class="absolute top-4 left-4 flex flex-col gap-1">
                <div id="rebirth-badge" class="text-sm font-black text-purple-400 font-money bg-purple-900/20 px-2 py-1 rounded">1.0x MULTIPLIER</div>
                <button onclick="toggleFS()" class="text-[9px] text-slate-500 uppercase text-left">Fullscreen</button>
            </div>
            
            <button onclick="openLeaderboard()" class="absolute top-4 right-4 bg-orange-600 px-4 py-2 rounded-full font-black text-[10px] uppercase shadow-lg shadow-orange-900/20">🏆 ŽEBŘÍČEK</button>

            <h1 class="text-5xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-b from-orange-400 to-orange-700 italic mb-4">Honza3D</h1>

            <button onclick="handlePrint(event)" class="printer-btn w-36 h-36 md:w-64 md:h-64 rounded-[2.5rem] flex items-center justify-center mb-4">
                <span class="text-6xl md:text-8xl">🖨️</span>
            </button>

            <div class="text-center">
                <div class="text-4xl md:text-7xl font-black font-money text-white mb-2" id="money">0 Kč</div>
                <div class="flex gap-2 justify-center text-[10px] md:text-sm">
                    <span class="text-blue-400 font-bold bg-blue-900/20 px-2 py-1 rounded" id="speed">0 Kč/s</span>
                    <span class="text-orange-400 font-bold bg-orange-900/20 px-2 py-1 rounded" id="power">1 Kč/klik</span>
                </div>
            </div>
        </div>

        <div class="w-full md:w-[400px] bg-slate-900/90 border-t md:border-t-0 md:border-l border-white/10 flex flex-col h-[55%] md:h-full">
            <div class="p-4 border-b border-white/5 bg-black/20 flex justify-between items-center">
                <h2 class="text-lg font-black uppercase text-orange-500 italic">Upgrady</h2>
                <span id="player-display" class="text-[10px] text-slate-500 font-bold uppercase tracking-tighter"></span>
            </div>
            
            <div id="upgrade-list" class="upgrade-container p-4"></div>
            
            <div class="p-4 bg-slate-900 border-t border-white/10 mt-auto">
                <div class="bg-black/40 p-3 rounded-lg border border-white/5 mb-3">
                    <div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase mb-1">
                        <span>Progress k Rebirthu</span>
                        <span id="progress-percent" class="text-orange-500">0%</span>
                    </div>
                    <div class="h-1.5 bg-black/60 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-orange-500 transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
                <button onclick="doRebirth()" id="rebirth-btn" class="w-full bg-slate-800 p-4 rounded-xl font-black opacity-50 uppercase text-sm transition-all text-slate-500 flex flex-col items-center">
                    Provést Rebirth (+1.0x)
                    <div class="text-[10px] font-normal" id="rebirth-price-tag">Cena: 100B Kč</div>
                </button>
            </div>
        </div>
    </div>

    <script>
        const BIN_ID = "69b2c797b7ec241ddc61e402";
        const MASTER_KEY = "$2a$10$p9H9.IwZd4RwszyzR8Ojke.IrWVwKXcn6cXbF141uUazU.Lr1ZViW";
        const SERVER_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let money = 0, multiplier = 1.0, rebirthPrice = 100000000000, clickPower = 1, incomePerSecond = 0;
        const suffixes = ["", "k", "M", "B", "T", "Q", "S", "N", "D", "U", "V", "G"];
        const manualCosts = ['15', '100', '1k', '5k', '25k', '100k', '500k', '2m', '10m', '50m', '250m', '1b', '5b', '25b', '100b', '500b', '2t', '10t', '50t', '250t', '1q', '5q', '25q', '100q', '500q', '2s', '10s', '50s', '250s', '1n', '5n', '25n', '100n', '500n', '2d', '10d', '50d', '250d', '1u', '5u', '25u', '100u', '500u', '1v', '10v', '100v', '1g', '10g', '100g', '1000g'];
        const upgradeNames = ["Starý Ender", "Tryska 0.4mm", "Lepidlo", "Ocel tryska", "Bambu Lab", "Safír hrot", "Plech Průša", "Titan Heatbreak", "Resin bazén", "Laser měření", "Panelák farma", "Vulkan tryska", "Al extrudér", "Diamant hrot", "Voron", "Voda chlazení", "Hala Brno", "Ultra tryska", "Robot rám", "Karbid tryska", "Křemík pec", "Plazma extr.", "Cloud server", "Nukleární teplo", "USA pobočka", "Molekul tryska", "Nano linka", "Antihmota", "Měsíční těžba", "Gravit měnič", "Mars Kolonie", "Časová smyčka", "Orbital stanice", "Kvant extr.", "Saturn prstence", "Neutron tryska", "Mezigalaktik", "Temná hmota", "Dyson sféra", "Hologram", "Vládce soustavy", "Singularita", "Tkadlec", "Bůh tryska", "Honza3D Bůh", "Nekonečno", "Konec vesmíru", "Nová dimenze", "Matrix", "Master Model"];

        function parseShortNumber(val) {
            val = val.toLowerCase(); const num = parseFloat(val);
            if (val.includes('k')) return num * 1e3; if (val.includes('m')) return num * 1e6;
            if (val.includes('b')) return num * 1e9; if (val.includes('t')) return num * 1e12;
            if (val.includes('q')) return num * 1e15; if (val.includes('s')) return num * 1e18;
            if (val.includes('n')) return num * 1e21; if (val.includes('d')) return num * 1e24;
            if (val.includes('u')) return num * 1e27; if (val.includes('v')) return num * 1e30;
            if (val.includes('g')) return num * 1e33; return num;
        }

        const upgrades = upgradeNames.map((name, i) => ({
            id: i, name, cost: parseShortNumber(manualCosts[i]), value: parseShortNumber(manualCosts[i]) / 8,
            type: i % 2 !== 0 ? 'click' : 'auto', icon: i % 2 !== 0 ? "⚡" : "📦", count: 0
        }));

        function formatMoney(num) {
            if (num < 1000) return Math.floor(num) + " Kč";
            const exp = Math.floor(Math.log10(num) / 3);
            return (num / Math.pow(1000, exp)).toLocaleString('cs-CZ', {maximumFractionDigits: 1}) + " " + (suffixes[exp] || "e"+exp*3);
        }

        async function syncWithServer() {
            const pName = localStorage.getItem('honza3D_name');
            if (!pName || pName.trim() === "" || pName.toLowerCase().startsWith("hráč")) return;

            const status = document.getElementById('sync-status');
            if(status) status.innerText = "📡 SYNC...";

            try {
                const getRes = await fetch(`${SERVER_URL}/latest?nocache=${Date.now()}`, {
                    headers: { "X-Master-Key": MASTER_KEY }
                });
                const responseData = await getRes.json();
                
                let players = [];
                if (responseData.record && responseData.record.players) players = responseData.record.players;
                else if (Array.isArray(responseData.record)) players = responseData.record;

                const rbCount = Math.round(multiplier - 1);
                
                // Odstranění starého jména, pokud se změnilo, aby se v tabulce neopakoval
                const oldName = localStorage.getItem('honza3D_oldName');
                if (oldName && oldName !== pName) {
                    players = players.filter(p => p.name !== oldName);
                    localStorage.removeItem('honza3D_oldName');
                }

                const playerIndex = players.findIndex(p => p.name === pName);
                
                if (playerIndex > -1) {
                    if (players[playerIndex].rebirths < rbCount) players[playerIndex].rebirths = rbCount;
                } else {
                    players.push({ name: pName, rebirths: rbCount });
                }

                players.sort((a, b) => b.rebirths - a.rebirths);
                const finalData = { players: players.slice(0, 50) };

                await fetch(SERVER_URL, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                    body: JSON.stringify(finalData)
                });

                if(status) status.innerText = "✅ ONLINE";
            } catch (e) {
                if(status) status.innerText = "❌ OFFLINE";
            }
        }

        async function updateLeaderboardUI() {
            const container = document.getElementById('leaderboard-content');
            const currentNameDisplay = document.getElementById('current-name-display');
            
            const pName = localStorage.getItem('honza3D_name') || "Nepojmenován";
            currentNameDisplay.innerText = pName;

            container.innerHTML = "<div class='text-center animate-pulse py-4 text-slate-500 uppercase text-xs'>Stahuji data z cloudu...</div>";
            try {
                const res = await fetch(`${SERVER_URL}/latest?nocache=${Date.now()}`, {
                    headers: { "X-Master-Key": MASTER_KEY }
                });
                const data = await res.json();
                const players = data.record.players || [];
                
                if (players.length === 0) {
                    container.innerHTML = "<div class='text-center py-4 text-slate-500'>Žebříček je zatím prázdný.</div>";
                    return;
                }

                container.innerHTML = players
                    .sort((a,b) => b.rebirths - a.rebirths)
                    .slice(0, 15)
                    .map((p, i) => `
                        <div class="flex justify-between items-center p-3 ${p.name === pName ? 'bg-orange-500/20 border border-orange-500' : (i < 3 ? 'bg-orange-500/10 border border-orange-500/20' : 'bg-white/5')} rounded-xl transition-all">
                            <div class="flex items-center gap-3">
                                <span class="font-black ${i < 3 ? 'text-orange-500' : 'text-slate-600'} w-4">${i+1}.</span>
                                <span class="font-bold text-sm tracking-wide">${p.name} ${p.name === pName ? '<span class="text-[10px] text-orange-400 font-normal ml-1">(TY)</span>' : ''}</span>
                            </div>
                            <b class="text-orange-500 font-money text-xs">${p.rebirths} RB</b>
                        </div>`
                    ).join('');
            } catch(e) { container.innerHTML = "<div class='text-red-500 text-center'>Chyba spojení</div>"; }
        }

        function changeNamePrompt() {
            const oldName = localStorage.getItem('honza3D_name');
            const newName = prompt("Zadej své nové jméno (3-15 znaků):", oldName);
            
            if (newName && newName.length >= 3 && newName.length <= 15 && !newName.toLowerCase().startsWith("hráč")) {
                localStorage.setItem('honza3D_oldName', oldName);
                localStorage.setItem('honza3D_name', newName);
                updateUI();
                syncWithServer().then(() => updateLeaderboardUI());
            } else {
                alert("Neplatné jméno! Musí mít 3-15 znaků a nesmí začínat na 'Hráč'.");
            }
        }

        function handlePrint(e) { 
            money += clickPower * multiplier; 
            updateUI(); 
            saveGame(); 
        }

        function toggleFS() { 
            if (!document.fullscreenElement) document.documentElement.requestFullscreen(); 
            else document.exitFullscreen(); 
        }

        function openLeaderboard() { 
            document.getElementById('leaderboard-modal').style.display = 'flex'; 
            updateLeaderboardUI(); 
            syncWithServer();
        }

        function closeLeaderboard() { 
            document.getElementById('leaderboard-modal').style.display = 'none'; 
        }

        function doRebirth() {
            if (money >= rebirthPrice) {
                multiplier += 1.0; 
                money = 0; 
                incomePerSecond = 0; 
                clickPower = 1;
                rebirthPrice *= 5; 
                upgrades.forEach(u => u.count = 0);
                renderList(); 
                updateUI(); 
                saveGame(); 
                syncWithServer();
            }
        }

        function updateUI() {
            let pName = localStorage.getItem('honza3D_name');
            if (!pName || pName.toLowerCase().startsWith("hráč")) { 
                pName = prompt("Vítej! Zadej své unikátní jméno pro žebříček:") || "User" + Math.floor(Math.random()*1000); 
                localStorage.setItem('honza3D_name', pName); 
            }
            document.getElementById('player-display').innerText = pName;
            document.getElementById('money').innerText = formatMoney(money);
            document.getElementById('speed').innerText = formatMoney(incomePerSecond * multiplier) + "/s";
            document.getElementById('power').innerText = formatMoney(clickPower * multiplier) + "/klik";
            document.getElementById('rebirth-badge').innerText = multiplier.toFixed(1) + "x MULTIPLIER";
            document.getElementById('rebirth-price-tag').innerText = "Cena: " + formatMoney(rebirthPrice);
            
            const prog = Math.min((money / rebirthPrice) * 100, 100);
            document.getElementById('progress-bar').style.width = prog + "%";
            document.getElementById('progress-percent').innerText = Math.floor(prog) + "%";
            
            const btn = document.getElementById('rebirth-btn');
            if (money >= rebirthPrice) btn.classList.add('rebirth-ready');
            else btn.classList.remove('rebirth-ready');
            
            upgrades.forEach((u, i) => {
                const card = document.getElementById(`upg-${i}`);
                if (card) card.style.opacity = money >= u.cost ? "1" : "0.3";
            });
        }

        function renderList() {
            document.getElementById('upgrade-list').innerHTML = upgrades.map((u, i) => `
                <div onclick="buyUpgrade(${i})" id="upg-${i}" class="upgrade-card ${u.type === 'click' ? 'upgrade-click' : 'upgrade-auto'} p-3 rounded-xl flex justify-between items-center cursor-pointer active:scale-95">
                    <div class="flex gap-3 items-center">
                        <span class="text-2xl">${u.icon}</span>
                        <div>
                            <div class="font-bold text-[11px] uppercase tracking-tight">${u.name}</div>
                            <div class="text-[9px] opacity-60">+${formatMoney(u.value)}</div>
                        </div>
                    </div>
                    <div class="text-right font-black text-[11px] text-orange-400">${formatMoney(u.cost)}</div>
                </div>`).join('');
        }

        function buyUpgrade(idx) {
            const u = upgrades[idx];
            if (money >= u.cost) { 
                money -= u.cost; 
                u.count++; 
                if(u.type === 'auto') incomePerSecond += u.value; 
                else clickPower += u.value; 
                updateUI(); 
                saveGame(); 
            }
        }

        function saveGame() { 
            const data = { money, multiplier, rebirthPrice, counts: upgrades.map(u => u.count) }; 
            localStorage.setItem('honza3D_save', JSON.stringify(data)); 
        }

        function loadGame() {
            const saved = localStorage.getItem('honza3D_save');
            if (saved) {
                const d = JSON.parse(saved); 
                money = d.money; 
                multiplier = d.multiplier; 
                rebirthPrice = d.rebirthPrice;
                d.counts.forEach((c, i) => { 
                    if(upgrades[i]) { 
                        upgrades[i].count = c; 
                        if (upgrades[i].type === 'auto') incomePerSecond += c * upgrades[i].value; 
                        else clickPower += c * upgrades[i].value; 
                    }
                });
            }
            renderList(); updateUI();
        }

        setInterval(() => { 
            if (incomePerSecond > 0) { 
                money += (incomePerSecond * multiplier) / 10; 
                updateUI(); 
            } 
        }, 100);

        setInterval(syncWithServer, 60000);
        loadGame();
    </script>
</body>
</html>
