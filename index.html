<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honza3D | Ultimate Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* Povoleno scrollování pro mobily */
        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); 
            font-family: 'Rajdhani', sans-serif; 
            touch-action: pan-y; /* Povolí vertikální scroll prstem */
            min-height: 100vh;
            overflow-x: hidden;
        }
        h1, .font-money { font-family: 'Orbitron', sans-serif; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 1000; }
        
        .printer-btn { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 2px solid rgba(249, 115, 22, 0.3); 
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.1);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .printer-btn:active { transform: scale(0.85); }

        .upgrade-card { background: rgba(15, 23, 42, 0.6); border-left: 4px solid transparent; transition: all 0.2s ease; }
        .upgrade-click { border-left-color: #f97316; box-shadow: inset 5px 0 15px rgba(249, 115, 22, 0.05); }
        .upgrade-auto { border-left-color: #3b82f6; box-shadow: inset 5px 0 15px rgba(59, 130, 246, 0.05); }
        
        .tab-active { border-bottom: 3px solid #f97316; color: white; }
        
        .rebirth-ready { 
            animation: neonPulse 1.5s infinite alternate; 
            background: linear-gradient(135deg, #7e22ce 0%, #a855f7 100%) !important; 
            color: white !important; opacity: 1 !important; 
            border: 1px solid #d8b4fe !important;
        }
        @keyframes neonPulse { from { box-shadow: 0 0 10px #a855f7; } to { box-shadow: 0 0 25px #d8b4fe; } }

        .fs-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="text-slate-200 select-none">

    <div id="leaderboard-modal" class="modal items-center justify-center p-4">
        <div class="bg-slate-900 border border-orange-500/30 w-full max-w-md rounded-2xl p-6 shadow-2xl relative">
            <button onclick="closeLeaderboard()" class="absolute top-4 right-4 text-slate-500 hover:text-white text-2xl">✕</button>
            <h2 class="text-xl font-black text-orange-500 italic uppercase mb-4 text-center tracking-widest">Honza3D | Ultimate Empire SÍŤ</h2>
            <div class="flex border-b border-white/10 mb-4 text-slate-400 font-bold uppercase text-[10px] tracking-widest">
                <button id="tab-pc" onclick="switchTab('PC')" class="flex-1 py-3 tab-active">💻 PC Top 10</button>
                <button id="tab-mobile" onclick="switchTab('Mobil')" class="flex-1 py-3">📱 Mobil Top 10</button>
            </div>
            <div id="leaderboard-content" class="space-y-2 max-h-[50vh] overflow-y-auto pr-2 text-xs"></div>
        </div>
    </div>

    <div class="flex flex-col md:flex-row min-h-screen">
        <div class="w-full md:flex-grow flex flex-col items-center justify-center relative p-6 py-12 md:h-screen">
            <div class="absolute top-6 left-6 flex flex-col gap-2">
                <div id="rebirth-badge" class="text-lg font-black text-purple-400 font-money">1.0x MULTIPLIER</div>
                <div class="flex gap-2">
                    <button onclick="toggleFS()" class="fs-btn px-3 py-1 rounded text-[9px] uppercase font-bold text-slate-400">Fullscreen ⛶</button>
                    <div id="sync-status-text" class="text-[9px] text-green-500 uppercase font-bold flex items-center gap-1">● Live Sync</div>
                </div>
                <div id="player-name-display" class="text-[10px] text-orange-400 font-bold uppercase tracking-widest italic mt-1">Hráč: ---</div>
            </div>

            <button onclick="openLeaderboard()" class="absolute top-6 right-6 bg-orange-600 px-4 py-2 rounded-full font-black text-[10px] uppercase shadow-lg hover:bg-orange-500">🏆 Žebříček</button>

            <h1 class="text-3xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-orange-400 to-orange-700 italic mb-8 mt-12 md:mt-0">Honza3D</h1>

            <button onclick="handlePrint(event)" class="printer-btn w-44 h-44 md:w-64 md:h-64 rounded-3xl flex items-center justify-center mb-8">
                <span class="text-7xl md:text-9xl">🖨️</span>
            </button>

            <div class="text-center space-y-4">
                <div class="text-5xl md:text-7xl font-black font-money text-white break-all" id="money">0 Kč</div>
                <div class="flex gap-4 bg-black/30 p-3 rounded-xl border border-white/5 justify-center">
                    <div class="text-blue-400 font-bold text-sm md:text-base" id="speed">0 Kč/s</div>
                    <div class="text-orange-400 font-bold text-sm md:text-base" id="power">1 Kč/klik</div>
                </div>
            </div>
        </div>

        <div class="w-full md:w-[400px] bg-slate-900/95 flex flex-col border-t md:border-t-0 md:border-l border-white/10 shadow-2xl backdrop-blur-xl">
            <div class="p-4 border-b border-white/5 flex justify-between items-center bg-black/20 sticky top-0 z-10">
                <h2 class="text-lg font-black uppercase italic text-orange-500">Vybavení (50)</h2>
            </div>
            
            <div id="upgrade-list" class="flex-grow p-4 space-y-2 md:overflow-y-auto"></div>
            
            <div class="p-6 bg-slate-900/90 border-t border-white/10 space-y-4 pb-12 md:pb-6">
                <div class="bg-black/40 p-3 rounded-lg border border-white/5">
                    <div class="flex justify-between text-[10px] uppercase font-bold text-slate-500 mb-2">
                        <span>Rebirth Progress</span>
                        <span id="progress-percent" class="text-orange-500 font-black">0%</span>
                    </div>
                    <div class="h-2 bg-black/60 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-orange-500 shadow-[0_0_15px_#f97316] transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
                <button onclick="doRebirth()" id="rebirth-btn" class="w-full bg-slate-800 p-5 rounded-xl font-black opacity-50 uppercase text-sm transition-all text-slate-500 flex flex-col items-center">
                    Rebirth (+1.0x)
                    <div class="text-[10px] font-normal mt-1 italic" id="rebirth-price-tag">Cena: 100B Kč</div>
                </button>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://api.npoint.io/422b28f90cc9fc44342d"; 
        let money = 0, multiplier = 1.0, rebirthPrice = 100000000000, clickPower = 1, incomePerSecond = 0, currentTab = "PC";
        const deviceType = /Mobi|Android|iPhone/i.test(navigator.userAgent) ? "Mobil" : "PC";

        const manualCosts = ['15', '100', '1k', '5k', '25k', '100k', '500k', '2m', '10m', '50m', '250m', '1b', '5b', '25b', '100b', '500b', '2t', '10t', '50t', '250t', '1q', '5q', '25q', '100q', '500q', '2s', '10s', '50s', '250s', '1n', '5n', '25n', '100n', '500n', '2d', '10d', '50d', '250d', '1u', '5u', '25u', '100u', '500u', '1v', '10v', '100v', '1g', '10g', '100g', '1000g'];
        const upgradeNames = ["Starý Ender", "Tryska 0.4mm", "Lepidlo", "Ocel tryska", "Bambu Lab", "Safír hrot", "Plech Průša", "Titan Heatbreak", "Resin bazén", "Laser měření", "Panelák farma", "Vulkan tryska", "Al extrudér", "Diamant hrot", "Voron", "Voda chlazení", "Hala Brno", "Ultra tryska", "Robot rám", "Karbid tryska", "Křemík pec", "Plazma extr.", "Cloud server", "Nukleární teplo", "USA pobočka", "Molekul tryska", "Nano linka", "Antihmota", "Měsíční těžba", "Gravit měnič", "Mars Kolonie", "Časová smyčka", "Orbital stanice", "Kvant extr.", "Saturn prstence", "Neutron tryska", "Mezigalaktik", "Temná hmota", "Dyson sféra", "Hologram", "Vládce soustavy", "Singularita", "Tkadlec", "Bůh tryska", "Honza3D Bůh", "Nekonečno", "Konec vesmíru", "Nová dimenze", "Matrix", "Master Model"];
        const suffixes = ["", "k", "M", "B", "T", "Q", "S", "N", "D", "U", "V", "G"];

        function parseShortNumber(val) {
            val = val.toLowerCase(); const num = parseFloat(val);
            if (val.includes('k')) return num * 1e3; if (val.includes('m')) return num * 1e6;
            if (val.includes('b')) return num * 1e9; if (val.includes('t')) return num * 1e12;
            if (val.includes('q')) return num * 1e15; if (val.includes('s')) return num * 1e18;
            if (val.includes('n')) return num * 1e21; if (val.includes('d')) return num * 1e24;
            if (val.includes('u')) return num * 1e27; if (val.includes('v')) return num * 1e30;
            if (val.includes('g')) return num * 1e33; return num;
        }

        const upgrades = upgradeNames.map((name, i) => ({
            id: i, name, cost: parseShortNumber(manualCosts[i]), value: parseShortNumber(manualCosts[i]) / 8,
            type: i % 2 !== 0 ? 'click' : 'auto', icon: i % 2 !== 0 ? "⚡" : "📦", count: 0
        }));

        function formatMoney(num) {
            if (num < 1000) return Math.floor(num) + " Kč";
            const exp = Math.floor(Math.log10(num) / 3);
            return (num / Math.pow(1000, exp)).toLocaleString('cs-CZ', {maximumFractionDigits: 1}) + " " + (suffixes[exp] || "e"+exp*3);
        }

        async function fetchLeaderboard() { try { const res = await fetch(SERVER_URL); const data = await res.json(); return data.players || []; } catch(e) { return []; } }

        async function syncWithServer() {
            const pName = localStorage.getItem('honza3D_name') || "Hráč";
            const rbCount = Math.round(multiplier - 1);
            try {
                const currentData = await fetchLeaderboard();
                const updatedPlayers = [...currentData.filter(p => p.name !== pName), { name: pName, rebirths: rbCount, type: deviceType }];
                await fetch(SERVER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ players: updatedPlayers }) });
            } catch (e) { console.error("Sync error"); }
        }

        async function updateLeaderboardUI() {
            const container = document.getElementById('leaderboard-content');
            container.innerHTML = `<div class="text-center py-4 italic opacity-50 uppercase text-[10px]">Syncing...</div>`;
            const players = await fetchLeaderboard();
            const pName = localStorage.getItem('honza3D_name') || "Hráč";
            const myData = { name: pName, rebirths: Math.round(multiplier-1), type: deviceType, me: true };
            const combined = [...players.filter(p => p.name !== pName), myData]
                .filter(p => p.type === currentTab).sort((a,b) => b.rebirths - a.rebirths).slice(0, 10);
            container.innerHTML = combined.map((p, i) => `<div class="flex justify-between items-center p-3 ${p.me?'bg-orange-500/20 border border-orange-500/50':'bg-white/5'} rounded-lg"><span class="font-bold"><b class="text-orange-500 mr-2">${i+1}.</b> ${p.name}</span><span class="font-black">${p.rebirths} RB</span></div>`).join('');
        }

        function toggleFS() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        function handlePrint(e) { money += clickPower * multiplier; updateUI(); saveGame(); }
        function openLeaderboard() { document.getElementById('leaderboard-modal').style.display = 'flex'; updateLeaderboardUI(); }
        function closeLeaderboard() { document.getElementById('leaderboard-modal').style.display = 'none'; }
        function switchTab(tab) { currentTab = tab; document.getElementById('tab-pc').className = tab==='PC'?'flex-1 py-3 tab-active':'flex-1 py-3'; document.getElementById('tab-mobile').className = tab==='Mobil'?'flex-1 py-3 tab-active':'flex-1 py-3'; updateLeaderboardUI(); }

        function doRebirth() {
            if (money >= rebirthPrice) {
                multiplier += 1.0; money = 0; incomePerSecond = 0; clickPower = 1;
                rebirthPrice *= 5; upgrades.forEach(u => u.count = 0);
                renderList(); updateUI(); saveGame(); syncWithServer();
            }
        }

        function updateUI() {
            let pName = localStorage.getItem('honza3D_name');
            if (!pName) { pName = prompt("Zadej jméno:") || "Hráč" + Math.floor(Math.random()*100); localStorage.setItem('honza3D_name', pName); }
            document.getElementById('player-name-display').innerText = `Hráč: ${pName}`;
            document.getElementById('money').innerText = formatMoney(money);
            document.getElementById('speed').innerText = formatMoney(incomePerSecond * multiplier) + "/s";
            document.getElementById('power').innerText = formatMoney(clickPower * multiplier) + "/klik";
            document.getElementById('rebirth-badge').innerText = multiplier.toFixed(1) + "x MULTIPLIER";
            document.getElementById('rebirth-price-tag').innerText = "Cena: " + formatMoney(rebirthPrice);
            const prog = Math.min((money / rebirthPrice) * 100, 100);
            document.getElementById('progress-bar').style.width = prog + "%";
            document.getElementById('progress-percent').innerText = Math.floor(prog) + "%";
            const btn = document.getElementById('rebirth-btn');
            if (money >= rebirthPrice) { btn.classList.add('rebirth-ready'); btn.classList.remove('opacity-50', 'text-slate-500'); } 
            else { btn.classList.remove('rebirth-ready'); btn.classList.add('opacity-50', 'text-slate-500'); }
            upgrades.forEach((u, i) => {
                const card = document.getElementById(`upg-${i}`);
                if (card) { card.style.opacity = money >= u.cost ? "1" : "0.3"; card.style.filter = money >= u.cost ? "none" : "grayscale(0.5)"; }
            });
        }

        function renderList() {
            document.getElementById('upgrade-list').innerHTML = upgrades.map((u, i) => `
                <div onclick="buyUpgrade(${i})" id="upg-${i}" class="upgrade-card ${u.type === 'click' ? 'upgrade-click' : 'upgrade-auto'} p-3 rounded-lg flex justify-between items-center cursor-pointer">
                    <div class="flex gap-2 items-center"><span class="text-xl">${u.icon}</span><div><div class="font-bold text-[11px] text-white">${u.name}</div><div class="text-[9px] ${u.type === 'click' ? 'text-orange-500' : 'text-blue-500'} font-bold">+${formatMoney(u.value)}</div></div></div>
                    <div class="text-right"><div class="text-[11px] font-black text-white">${formatMoney(u.cost)}</div><div class="text-[8px] opacity-50 font-bold uppercase">${u.count}x</div></div>
                </div>`).join('');
        }

        function buyUpgrade(idx) {
            const u = upgrades[idx];
            if (money >= u.cost) { money -= u.cost; u.count++; if(u.type === 'auto') incomePerSecond += u.value; else clickPower += u.value; updateUI(); saveGame(); }
        }

        function saveGame() { const data = { money, multiplier, rebirthPrice, counts: upgrades.map(u => u.count) }; localStorage.setItem('honza3D_save', JSON.stringify(data)); }
        function loadGame() {
            const saved = localStorage.getItem('honza3D_save');
            if (saved) {
                const data = JSON.parse(saved);
                money = data.money || 0; multiplier = data.multiplier || 1.0; rebirthPrice = data.rebirthPrice || 100000000000;
                data.counts.forEach((count, i) => { if(upgrades[i]) { upgrades[i].count = count; if (upgrades[i].type === 'auto') incomePerSecond += count * upgrades[i].value; else clickPower += count * upgrades[i].value; }});
            }
            renderList(); updateUI();
        }

        setInterval(() => { if (incomePerSecond > 0) { money += (incomePerSecond * multiplier) / 10; updateUI(); } }, 100);
        loadGame();
    </script>
</body>
</html>
