<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honza3D | Ultimate Empire</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #f97316; --secondary: #3b82f6; --bg-dark: #020617; }
        body { background: var(--bg-dark); font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; color: white; }

        /* --- FANCY POZADÍ --- */
        #dynamic-glow {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.1) 0%, rgba(249, 115, 22, 0.05) 50%, rgba(2, 6, 23, 1) 100%);
            transition: all 0.8s ease;
        }

        canvas#particle-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

        /* --- BÍLÝ TITULEK --- */
        .main-title {
            font-family: 'Orbitron', sans-serif;
            color: #f97316;
            text-shadow: 0 0 30px rgb(114, 54, 4), 0 10px 10px rgba(0,0,0,0.5);
        }

        /* --- TISKÁRNA --- */
        .printer-btn { 
            background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(15px); 
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .printer-btn:active { transform: scale(0.9); }
        .combo-fire { border-color: #ef4444 !important; box-shadow: 0 0 50px rgba(239, 68, 68, 0.5) !important; animation: shake 0.2s infinite; }
        @keyframes shake { 0% {transform:translate(1px,1px)} 50% {transform:translate(-1px,-1px)} 100% {transform:translate(1px,-1px)} }

        /* --- BAREVNÉ UPGRADY --- */
        .upgrade-card { transition: 0.2s; cursor: pointer; border-radius: 1.25rem; margin-bottom: 0.75rem; }
        .upgrade-card:active { transform: scale(0.95); }
        
        /* Modrá pro Pasivní (Auto) */
        .card-blue { 
            background: rgba(59, 130, 246, 0.1); 
            border: 1px solid rgba(59, 130, 246, 0.3); 
            border-left: 6px solid var(--secondary);
        }
        .card-blue:hover { background: rgba(59, 130, 246, 0.2); }

        /* Oranžová pro Kliky */
        .card-orange { 
            background: rgba(249, 115, 22, 0.1); 
            border: 1px solid rgba(249, 115, 22, 0.3); 
            border-left: 6px solid var(--primary);
        }
        .card-orange:hover { background: rgba(249, 115, 22, 0.2); }

        /* --- TOASTS --- */
        .toast {
            background: rgba(15, 23, 42, 0.9); border-left: 4px solid var(--primary);
            padding: 12px 24px; border-radius: 10px; font-weight: 900; font-family: 'Orbitron';
            animation: toastSlide 3s forwards;
        }
        @keyframes toastSlide { 0%{opacity:0; transform:translateY(50px)} 10%{opacity:1; transform:translateY(0)} 90%{opacity:1} 100%{opacity:0} }

        .upgrade-container { height: calc(100vh - 480px); overflow-y: auto; padding-right: 5px; }
        .tab-active { color: var(--primary); border-bottom: 2px solid var(--primary); opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="dynamic-glow"></div>
    <canvas id="particle-canvas"></canvas>
    
    <button onclick="toggleFS()" class="fixed top-6 left-6 z-[500] bg-white/5 hover:bg-white/10 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/10 transition-all">
        📺 Full Screen
    </button>

    <div id="ldb-modal" class="fixed inset-0 bg-black/95 z-[3000] hidden items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-slate-900 border border-white/10 w-full max-w-md rounded-[2.5rem] p-8 relative flex flex-col max-h-[85vh]">
            <button onclick="closeLdb()" class="absolute top-6 right-8 text-3xl text-slate-500 hover:text-white">×</button>
            <h2 class="text-2xl font-black text-orange-500 text-center uppercase italic mb-6">Globální Statistiky</h2>
            
            <div class="flex justify-between mb-6 border-b border-white/5 pb-2 text-[10px] font-black uppercase">
                <button onclick="setTab('rebirths')" id="tab-rebirths" class="tab-active opacity-50 px-2">Top RB</button>
                <button onclick="setTab('money')" id="tab-money" class="opacity-50 px-2">Peníze</button>
                <button onclick="setTab('platform')" id="tab-platform" class="opacity-50 px-2">Zařízení</button>
            </div>

            <div id="ldb-content" class="flex-grow overflow-y-auto space-y-2 pr-2"></div>
            
            <div class="mt-6 pt-4 border-t border-white/10 text-center">
                <button onclick="changeName()" class="text-[10px] uppercase font-bold bg-white/5 px-6 py-2 rounded-lg border border-white/5">Změnit jméno ✏️</button>
            </div>
        </div>
    </div>

    <div class="flex flex-col md:flex-row h-screen relative z-10">
        <div class="w-full md:flex-grow flex flex-col items-center justify-center p-6 relative">
            <div class="absolute top-20 left-8">
                <div id="rb-badge" class="bg-purple-600/20 text-purple-400 border border-purple-500/30 px-4 py-1 rounded-full text-[10px] font-black italic">1.0x MULTI</div>
                <div id="combo-tag" class="text-orange-500 font-black italic mt-2 hidden animate-bounce text-xl">COMBO: <span id="combo-val">0</span>x 🔥</div>
            </div>

            <button onclick="openLdb()" class="absolute top-6 right-6 bg-orange-600 px-6 py-2.5 rounded-2xl font-black text-xs uppercase shadow-lg hover:scale-105 transition-all">🏆 Žebříček</button>

            <h1 class="main-title text-6xl md:text-9xl font-black italic mb-8">Honza3D</h1>

            <button id="printer-main" onclick="handlePrint(event)" class="printer-btn w-52 h-52 md:w-72 md:h-72 rounded-[4rem] flex items-center justify-center mb-10">
                <span class="text-8xl md:text-9xl">🖨️</span>
            </button>

            <div class="text-center">
                <div id="money-display" class="text-5xl md:text-8xl font-black font-money mb-4">0 Kč</div>
                <div class="flex gap-4 justify-center text-xs font-bold">
                    <span class="text-blue-400 bg-blue-400/10 px-4 py-2 rounded-xl border border-blue-400/20" id="gps-display">0 Kč/s</span>
                    <span class="text-orange-400 bg-orange-400/10 px-4 py-2 rounded-xl border border-orange-400/20" id="gpc-display">1 Kč/klik</span>
                </div>
            </div>
        </div>

        <div class="w-full md:w-[450px] bg-slate-900/80 backdrop-blur-2xl border-l border-white/10 flex flex-col h-[55%] md:h-full">
            <div class="p-6 border-b border-white/5">
                <h2 class="text-xl font-black uppercase text-orange-500 italic">Upgrade Centrum</h2>
                <div id="player-name-tag" class="text-[9px] text-slate-500 font-bold uppercase mt-1"></div>
            </div>

            <div id="upgrade-list" class="upgrade-container p-6"></div>

            <div class="p-6 bg-black/40 mt-auto border-t border-white/10">
                <div class="mb-4">
                    <div class="flex justify-between text-[10px] font-black text-slate-500 uppercase mb-2">
                        <span>Progress k Rebirthu</span>
                        <span id="prog-val" class="text-orange-500">0%</span>
                    </div>
                    <div class="h-2 bg-white/5 rounded-full overflow-hidden">
                        <div id="prog-bar" class="h-full bg-orange-500 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
                <button onclick="doRebirth()" id="rb-btn" class="w-full bg-slate-800 p-5 rounded-2xl font-black uppercase text-sm opacity-50 transition-all">
                    Provést Rebirth (+1.0x)
                    <div id="rb-price" class="text-[10px] font-normal opacity-60">Cena: 100B Kč</div>
                </button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[2000] flex flex-col gap-2"></div>

    <script>
        const BIN_ID = "69b2c797b7ec241ddc61e402", MASTER_KEY = "$2a$10$p9H9.IwZd4RwszyzR8Ojke.IrWVwKXcn6cXbF141uUazU.Lr1ZViW", SERVER_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        let money = 0, multi = 1.0, rbPrice = 1e11, gpc = 1, gps = 0, combo = 0, lastClick = 0, currentTab = 'rebirths';
        const platform = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ? "Mobil" : "PC";
        const suffixes = ["", "k", "M", "B", "T", "Q", "S", "N", "D", "U", "V", "G"];
        let reachedM = new Set();

        const upgNames = ["Starý Ender", "Tryska 0.4mm", "Lepidlo", "Ocel tryska", "Bambu Lab", "Safír hrot", "Plech Průša", "Titan Heat", "Resin bazén", "Laser měření", "Panelák", "Vulkan", "Al extrudér", "Diamant", "Voron Kit", "Voda", "Hala Brno", "Ultra", "Robot", "Master"];
        const upgCosts = ['15', '100', '1k', '5k', '25k', '100k', '500k', '2m', '10m', '50m', '250m', '1b', '5b', '25b', '100b', '500b', '2t', '10t', '50t', '250t'];
        
        function parseN(v) { 
            v = v.toLowerCase(); let n = parseFloat(v);
            if(v.includes('k')) n*=1e3; if(v.includes('m')) n*=1e6;
            if(v.includes('b')) n*=1e9; if(v.includes('t')) n*=1e12;
            return n;
        }

        const upgrades = upgNames.map((n, i) => ({
            id: i, name: n, cost: parseN(upgCosts[i]), val: parseN(upgCosts[i])/6,
            type: i % 2 === 0 ? 'auto' : 'click', count: 0
        }));

        function format(n) {
            if(n < 1000) return Math.floor(n) + " Kč";
            let e = Math.floor(Math.log10(n)/3);
            return (n/Math.pow(1000,e)).toLocaleString('cs-CZ',{maximumFractionDigits:1}) + " " + suffixes[e];
        }

        /* --- ČÁSTICE --- */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.onresize();

        class P {
            constructor(x,y) { 
                this.x=x; 
                this.y=y; 
                // Menší čísla u sx a sy = pomalejší rozlet
                this.sx=Math.random()*4-3; 
                this.sy=Math.random()*-6-3; 
                this.o=1; 
                this.t=Math.random()>0.5?"💰":"Kč"; 
            }
            update() { 
                this.sy+=0.4; 
                this.x+=this.sx; 
                this.y+=this.sy; 
                // Menší číslo u odečítání o (např. 0.01) = věci vydrží déle viditelné
                this.o-=0.03; 
            }
            draw() { 
                ctx.globalAlpha=this.o; 
                ctx.font="bold 20px Arial"; 
                ctx.fillStyle="#f97316"; 
                ctx.fillText(this.t,this.x,this.y); 
            }
        }

        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles = particles.filter(p => p.o > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(anim);
        }
        anim();

        /* --- LOGIKA --- */
        function handlePrint(e) {
            const now = Date.now();
            if(now - lastClick < 400) combo++; else combo = 1;
            lastClick = now;
            let cB = combo > 50 ? 5 : (combo > 10 ? 1.5 : 1);
            money += gpc * multi * cB;

            const x = e.clientX || (e.touches ? e.touches[0].clientX : window.innerWidth/2);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : window.innerHeight/2);
            for(let i=0; i<8; i++) particles.push(new P(x,y));
            
            checkDopamine(); updateUI(); save();
        }

        function checkDopamine() {
            const ct = document.getElementById('combo-tag');
            const pr = document.getElementById('printer-main');
            if(combo > 5) { 
                ct.classList.remove('hidden'); document.getElementById('combo-val').innerText = combo;
                if(combo > 20) pr.classList.add('combo-fire');
            } else {
                ct.classList.add('hidden'); pr.classList.remove('combo-fire');
            }
            
            let mVal = money > 0 ? Math.floor(Math.log10(money)/3) : 0;
            const ms = [1e5, 1e6, 1e9, 1e12];
            ms.forEach(m => { if(money>=m && !reachedM.has(m)) { reachedM.add(m); toast("MILNÍK: " + format(m)); } });
        }

        function toast(t) {
            const c = document.getElementById('toast-container');
            const d = document.createElement('div'); d.className = 'toast'; d.innerText = t;
            c.appendChild(d); setTimeout(() => d.remove(), 3000);
        }

        function buyUpgrade(i) {
            const u = upgrades[i];
            if(money >= u.cost) {
                money -= u.cost; u.count++;
                if(u.type==='auto') gps += u.val; else gpc += u.val;
                u.cost *= 1.15;
                renderUpgrades(); updateUI(); save();
            }
        }

        function doRebirth() {
            if(money >= rbPrice) {
                multi += 1.0; money=0; gpc=1; gps=0; rbPrice*=10; reachedM.clear();
                upgrades.forEach(u => { u.count=0; u.cost = parseN(upgCosts[u.id]); });
                renderUpgrades(); updateUI(); save(); sync();
                toast("REBIRTH PROVEDEN!");
            }
        }

        function renderUpgrades() {
            document.getElementById('upgrade-list').innerHTML = upgrades.map((u, i) => `
                <div onclick="buyUpgrade(${i})" id="u-${i}" class="upgrade-card ${u.type==='auto'?'card-blue':'card-orange'} p-4 flex justify-between items-center">
                    <div>
                        <div class="text-[11px] font-black uppercase text-white">${u.name}</div>
                        <div class="text-[9px] opacity-60">+${format(u.val)} ${u.type==='auto'?'/s':'/klik'}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-orange-400 font-black text-xs">${format(u.cost)}</div>
                        <div class="text-[8px] opacity-40 uppercase">Level ${u.count}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateUI() {
            let n = localStorage.getItem('honza_name') || "Hráč" + Math.floor(Math.random()*99);
            localStorage.setItem('honza_name', n);
            document.getElementById('player-name-tag').innerText = n + " | " + platform;
            document.getElementById('money-display').innerText = format(money);
            document.getElementById('gps-display').innerText = format(gps * multi) + "/s";
            document.getElementById('gpc-display').innerText = format(gpc * multi) + "/klik";
            document.getElementById('rb-badge').innerText = multi.toFixed(1) + "x MULTI";
            document.getElementById('rb-price').innerText = "Cena: " + format(rbPrice);
            const p = Math.min((money/rbPrice)*100, 100);
            document.getElementById('prog-bar').style.width = p + "%";
            document.getElementById('prog-val').innerText = Math.floor(p) + "%";
            const btn = document.getElementById('rb-btn');
            if(money >= rbPrice) { btn.style.opacity = "1"; btn.classList.add('bg-orange-600'); }
            else { btn.style.opacity = "0.5"; btn.classList.remove('bg-orange-600'); }
            upgrades.forEach((u,i) => {
                const el = document.getElementById(`u-${i}`);
                if(el) el.style.opacity = money >= u.cost ? "1" : "0.3";
            });
        }

        /* --- CLOUD --- */
        async function sync() {
            const n = localStorage.getItem('honza_name');
            if(!n || n.startsWith("Hráč")) return;
            try {
                const r = await fetch(`${SERVER_URL}/latest`, { headers: {"X-Master-Key": MASTER_KEY}});
                const d = await r.json();
                let ps = d.record.players || [];
                const my = { name: n, rb: Math.round(multi-1), money: Math.floor(money), dev: platform, last: Date.now() };
                const idx = ps.findIndex(p => p.name === n);
                if(idx > -1) ps[idx] = my; else ps.push(my);
                await fetch(SERVER_URL, { method:'PUT', headers: {"Content-Type":"application/json", "X-Master-Key": MASTER_KEY}, body: JSON.stringify({players: ps.slice(0,100)}) });
            } catch(e) {}
        }

        async function updateLdb() {
            const c = document.getElementById('ldb-content');
            c.innerHTML = "<div class='text-center py-10 opacity-30 text-xs'>Načítám...</div>";
            try {
                const r = await fetch(`${SERVER_URL}/latest`, { headers: {"X-Master-Key": MASTER_KEY}});
                const d = await r.json();
                let ps = d.record.players || [];
                
                if(currentTab === 'rebirths') ps.sort((a,b) => b.rb - a.rb);
                else if(currentTab === 'money') ps.sort((a,b) => b.money - a.money);
                else if(currentTab === 'platform') ps.sort((a,b) => a.dev.localeCompare(b.dev));

                c.innerHTML = ps.map((p,i) => `
                    <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl">
                        <span class="text-[10px] font-black w-4 opacity-30">${i+1}</span>
                        <span class="flex-grow font-bold text-xs px-2">${p.name}</span>
                        <div class="text-right">
                            <div class="text-orange-400 font-black text-[10px]">${currentTab==='money'?format(p.money):p.rb+' RB'}</div>
                            <div class="text-[8px] opacity-40 uppercase">${p.dev}</div>
                        </div>
                    </div>
                `).join('');
            } catch(e) { c.innerHTML = "Offline"; }
        }

        function openLdb() { document.getElementById('ldb-modal').style.display = 'flex'; updateLdb(); }
        function closeLdb() { document.getElementById('ldb-modal').style.display = 'none'; }
        
        function setTab(t) {
            currentTab = t;
            document.querySelectorAll('#ldb-modal button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + t).classList.add('tab-active');
            updateLdb();
        }

        function changeName() {
            const n = prompt("Tvé jméno (3-12 znaků):");
            if(n && n.length >= 3 && n.length <= 12) { localStorage.setItem('honza_name', n); updateUI(); sync(); }
        }

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function save() {
            const d = { m: money, mu: multi, rp: rbPrice, c: upgrades.map(u => u.count), cs: upgrades.map(u => u.cost) };
            localStorage.setItem('honza_v_final', JSON.stringify(d));
        }
        function load() {
            const s = localStorage.getItem('honza_v_final');
            if(s) {
                const d = JSON.parse(s); money=d.m; multi=d.mu; rbPrice=d.rp;
                d.c.forEach((c, i) => { 
                    upgrades[i].count = c; upgrades[i].cost = d.cs[i];
                    if(upgrades[i].type==='auto') gps += c * upgrades[i].val; else gpc += c * upgrades[i].val;
                });
            }
            renderUpgrades(); updateUI();
        }

        setInterval(() => { if(gps>0){ money+=(gps*multi)/10; updateUI(); } }, 100);
        setInterval(() => { if(Date.now()-lastClick > 1500) { combo=0; checkDopamine(); } }, 500);
        setInterval(sync, 60000);
        load();
    </script>
</body>
</html>
