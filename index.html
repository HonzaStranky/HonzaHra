<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honza3D | Ultimate Empire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); 
            font-family: 'Rajdhani', sans-serif; 
            touch-action: pan-y;
            min-height: 100vh;
        }
        h1, .font-money { font-family: 'Orbitron', sans-serif; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 1000; }
        
        .printer-btn { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 2px solid rgba(249, 115, 22, 0.3); 
            box-shadow: 0 0 40px rgba(249, 115, 22, 0.15);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .printer-btn:active { transform: scale(0.85); }

        .upgrade-card { background: rgba(15, 23, 42, 0.6); border-left: 4px solid transparent; transition: all 0.2s ease; }
        .upgrade-click { border-left-color: #f97316; box-shadow: inset 5px 0 20px rgba(249, 115, 22, 0.05); }
        .upgrade-auto { border-left-color: #3b82f6; box-shadow: inset 5px 0 20px rgba(59, 130, 246, 0.05); }
        
        .tab-active { border-bottom: 3px solid #f97316; color: white; }
        
        /* Neon Rebirth */
        .rebirth-ready { 
            animation: neonPulse 1.5s infinite alternate; 
            background: linear-gradient(135deg, #7e22ce 0%, #a855f7 100%) !important; 
            color: white !important; opacity: 1 !important; 
        }
        @keyframes neonPulse { from { box-shadow: 0 0 10px #a855f7; } to { box-shadow: 0 0 25px #d8b4fe; } }

        /* Sticky Footer pro Mobil */
        @media (max-width: 768px) {
            .mobile-sticky-rebirth {
                position: sticky;
                bottom: 0;
                z-index: 50;
                background: rgba(15, 23, 42, 0.95);
                backdrop-filter: blur(10px);
                border-top: 1px solid rgba(255,255,255,0.1);
            }
        }
    </style>
</head>
<body class="text-slate-200 select-none">

    <div id="leaderboard-modal" class="modal items-center justify-center p-4">
        <div class="bg-slate-900 border border-orange-500/30 w-full max-w-md rounded-2xl p-6 shadow-2xl relative">
            <button onclick="closeLeaderboard()" class="absolute top-4 right-4 text-slate-500 hover:text-white text-2xl">✕</button>
            <h2 class="text-xl font-black text-orange-500 italic uppercase mb-4 text-center tracking-widest">Honza3D | SÍŤ</h2>
            <div id="leaderboard-content" class="space-y-2 max-h-[50vh] overflow-y-auto text-xs"></div>
        </div>
    </div>

    <div class="flex flex-col md:flex-row min-h-screen">
        <div class="flex-grow flex flex-col items-center justify-center relative p-6 py-12 md:h-screen">
            <div class="absolute top-6 left-6 flex flex-col gap-2">
                <div id="rebirth-badge" class="text-lg font-black text-purple-400 font-money">1.0x MULTIPLIER</div>
                <button onclick="toggleFS()" class="bg-white/5 border border-white/10 px-3 py-1 rounded text-[9px] uppercase font-bold text-slate-400">Fullscreen ⛶</button>
            </div>

            <button onclick="openLeaderboard()" class="absolute top-6 right-6 bg-orange-600 px-4 py-2 rounded-full font-black text-[10px] uppercase shadow-lg hover:bg-orange-500">🏆 Žebříček</button>

            <h1 class="text-6xl md:text-9xl font-black text-transparent bg-clip-text bg-gradient-to-b from-orange-400 to-orange-700 italic mb-8 md:mb-12">Honza3D</h1>

            <button onclick="handlePrint(event)" class="printer-btn w-48 h-48 md:w-72 md:h-72 rounded-3xl flex items-center justify-center mb-10">
                <span class="text-8xl md:text-9xl">🖨️</span>
            </button>

            <div class="text-center space-y-4">
                <div class="text-5xl md:text-8xl font-black font-money text-white" id="money">0 Kč</div>
                <div class="flex gap-4 bg-black/30 p-3 rounded-xl border border-white/5 justify-center">
                    <div class="text-blue-400 font-bold" id="speed">0 Kč/s</div>
                    <div class="text-orange-400 font-bold" id="power">1 Kč/klik</div>
                </div>
            </div>
        </div>

        <div class="w-full md:w-[450px] bg-slate-900/95 flex flex-col border-t md:border-t-0 md:border-l border-white/10 shadow-2xl backdrop-blur-xl">
            <div class="p-4 border-b border-white/5 bg-black/20 sticky top-0 z-10">
                <h2 class="text-lg font-black uppercase italic text-orange-500">Shop (50)</h2>
            </div>
            
            <div id="upgrade-list" class="flex-grow p-4 space-y-3 md:overflow-y-auto md:max-h-[calc(100vh-250px)]"></div>
            
            <div class="p-4 md:p-6 mobile-sticky-rebirth space-y-4">
                <div class="bg-black/40 p-3 rounded-lg border border-white/5">
                    <div class="flex justify-between text-[10px] uppercase font-bold text-slate-500 mb-2">
                        <span>Rebirth Progress</span>
                        <span id="progress-percent" class="text-orange-500 font-black">0%</span>
                    </div>
                    <div class="h-2 bg-black/60 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-orange-500 transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
                <button onclick="doRebirth()" id="rebirth-btn" class="w-full bg-slate-800 p-5 rounded-2xl font-black opacity-50 uppercase text-sm transition-all text-slate-500 flex flex-col items-center">
                    Rebirth (+1.0x)
                    <div class="text-[10px] font-normal mt-1 italic" id="rebirth-price-tag">Cena: 100B Kč</div>
                </button>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://api.npoint.io/422b28f90cc9fc44342d"; 
        let money = 0, multiplier = 1.0, rebirthPrice = 100000000000, clickPower = 1, incomePerSecond = 0;
        const deviceType = /Mobi|Android|iPhone/i.test(navigator.userAgent) ? "Mobil" : "PC";
        const suffixes = ["", "k", "M", "B", "T", "Q", "S", "N", "D", "U", "V", "G"];

        const manualCosts = ['15', '100', '1k', '5k', '25k', '100k', '500k', '2m', '10m', '50m', '250m', '1b', '5b', '25b', '100b', '500b', '2t', '10t', '50t', '250t', '1q', '5q', '25q', '100q', '500q', '2s', '10s', '50s', '250s', '1n', '5n', '25n', '100n', '500n', '2d', '10d', '50d', '250d', '1u', '5u', '25u', '100u', '500u', '1v', '10v', '100v', '1g', '10g', '100g', '1000g'];
        const upgradeNames = ["Starý Ender", "Tryska 0.4mm", "Lepidlo", "Ocel tryska", "Bambu Lab", "Safír hrot", "Plech Průša", "Titan Heatbreak", "Resin bazén", "Laser měření", "Panelák farma", "Vulkan tryska", "Al extrudér", "Diamant hrot", "Voron", "Voda chlazení", "Hala Brno", "Ultra tryska", "Robot rám", "Karbid tryska", "Křemík pec", "Plazma extr.", "Cloud server", "Nukleární teplo", "USA pobočka", "Molekul tryska", "Nano linka", "Antihmota", "Měsíční těžba", "Gravit měnič", "Mars Kolonie", "Časová smyčka", "Orbital stanice", "Kvant extr.", "Saturn prstence", "Neutron tryska", "Mezigalaktik", "Temná hmota", "Dyson sféra", "Hologram", "Vládce soustavy", "Singularita", "Tkadlec", "Bůh tryska", "Honza3D Bůh", "Nekonečno", "Konec vesmíru", "Nová dimenze", "Matrix", "Master Model"];

        function parseShortNumber(val) {
            val = val.toLowerCase(); const num = parseFloat(val);
            if (val.includes('k')) return num * 1e3; if (val.includes('m')) return num * 1e6;
            if (val.includes('b')) return num * 1e9; if (val.includes('t')) return num * 1e12;
            if (val.includes('q')) return num * 1e15; if (val.includes('s')) return num * 1e18;
            if (val.includes('n')) return num * 1e21; if (val.includes('d')) return num * 1e24;
            if (val.includes('u')) return num * 1e27; if (val.includes('v')) return num * 1e30;
            if (val.includes('g')) return num * 1e33; return num;
        }

        const upgrades = upgradeNames.map((name, i) => ({
            id: i, name, cost: parseShortNumber(manualCosts[i]), value: parseShortNumber(manualCosts[i]) / 8,
            type: i % 2 !== 0 ? 'click' : 'auto', icon: i % 2 !== 0 ? "⚡" : "📦", count: 0
        }));

        function formatMoney(num) {
            if (num < 1000) return Math.floor(num) + " Kč";
            const exp = Math.floor(Math.log10(num) / 3);
            return (num / Math.pow(1000, exp)).toLocaleString('cs-CZ', {maximumFractionDigits: 1}) + " " + (suffixes[exp] || "e"+exp*3);
        }

        async function syncWithServer() {
            const pName = localStorage.getItem('honza3D_name') || "Hráč";
            const rbCount = Math.round(multiplier - 1);
            try {
                const res = await fetch(SERVER_URL);
                const data = await res.json();
                const players = data.players || [];
                const updated = [...players.filter(p => p.name !== pName), { name: pName, rebirths: rbCount, type: deviceType }];
                await fetch(SERVER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ players: updated }) });
            } catch (e) { console.warn("Sync failed"); }
        }

        async function updateLeaderboardUI() {
            const container = document.getElementById('leaderboard-content');
            container.innerHTML = "Načítání...";
            try {
                const res = await fetch(SERVER_URL);
                const data = await res.json();
                const players = data.players || [];
                container.innerHTML = players.sort((a,b) => b.rebirths - a.rebirths).slice(0, 10).map((p, i) => 
                    `<div class="flex justify-between p-2 bg-white/5 rounded"><span>${i+1}. ${p.name}</span><b>${p.rebirths} RB</b></div>`
                ).join('');
            } catch(e) { container.innerHTML = "Server nedostupný."; }
        }

        function handlePrint(e) { money += clickPower * multiplier; updateUI(); saveGame(); }
        function toggleFS() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        function openLeaderboard() { document.getElementById('leaderboard-modal').style.display = 'flex'; updateLeaderboardUI(); }
        function closeLeaderboard() { document.getElementById('leaderboard-modal').style.display = 'none'; }

        function doRebirth() {
            if (money >= rebirthPrice) {
                multiplier += 1.0; money = 0; incomePerSecond = 0; clickPower = 1;
                rebirthPrice *= 5; upgrades.forEach(u => u.count = 0);
                renderList(); updateUI(); saveGame(); syncWithServer();
            }
        }

        function updateUI() {
            let pName = localStorage.getItem('honza3D_name');
            if (!pName) { pName = prompt("Tvé jméno:") || "Hráč"; localStorage.setItem('honza3D_name', pName); }
            document.getElementById('money').innerText = formatMoney(money);
            document.getElementById('speed').innerText = formatMoney(incomePerSecond * multiplier) + "/s";
            document.getElementById('power').innerText = formatMoney(clickPower * multiplier) + "/klik";
            document.getElementById('rebirth-badge').innerText = multiplier.toFixed(1) + "x MULTIPLIER";
            document.getElementById('rebirth-price-tag').innerText = "Cena: " + formatMoney(rebirthPrice);
            const prog = Math.min((money / rebirthPrice) * 100, 100);
            document.getElementById('progress-bar').style.width = prog + "%";
            document.getElementById('progress-percent').innerText = Math.floor(prog) + "%";
            const btn = document.getElementById('rebirth-btn');
            if (money >= rebirthPrice) btn.classList.add('rebirth-ready');
            else btn.classList.remove('rebirth-ready');
            upgrades.forEach((u, i) => {
                const card = document.getElementById(`upg-${i}`);
                if (card) card.style.opacity = money >= u.cost ? "1" : "0.3";
            });
        }

        function renderList() {
            document.getElementById('upgrade-list').innerHTML = upgrades.map((u, i) => `
                <div onclick="buyUpgrade(${i})" id="upg-${i}" class="upgrade-card ${u.type === 'click' ? 'upgrade-click' : 'upgrade-auto'} p-4 rounded-xl flex justify-between items-center cursor-pointer">
                    <div class="flex gap-3 items-center"><span class="text-2xl">${u.icon}</span><div><div class="font-bold text-sm">${u.name}</div><div class="text-[10px] opacity-70">+${formatMoney(u.value)}</div></div></div>
                    <div class="text-right font-black text-sm">${formatMoney(u.cost)}</div>
                </div>`).join('');
        }

        function buyUpgrade(idx) {
            const u = upgrades[idx];
            if (money >= u.cost) { money -= u.cost; u.count++; if(u.type === 'auto') incomePerSecond += u.value; else clickPower += u.value; updateUI(); saveGame(); }
        }

        function saveGame() { const data = { money, multiplier, rebirthPrice, counts: upgrades.map(u => u.count) }; localStorage.setItem('honza3D_save', JSON.stringify(data)); }
        function loadGame() {
            const saved = localStorage.getItem('honza3D_save');
            if (saved) {
                const d = JSON.parse(saved); money = d.money; multiplier = d.multiplier; rebirthPrice = d.rebirthPrice;
                d.counts.forEach((c, i) => { if(upgrades[i]) { upgrades[i].count = c; if (upgrades[i].type === 'auto') incomePerSecond += c * upgrades[i].value; else clickPower += c * upgrades[i].value; }});
            }
            renderList(); updateUI();
        }

        setInterval(() => { if (incomePerSecond > 0) { money += (incomePerSecond * multiplier) / 10; updateUI(); } }, 100);
        
        // AUTO SYNC KAŽDÉ 2 MINUTY (120000 ms)
        setInterval(syncWithServer, 120000);

        loadGame();
    </script>
</body>
</html>
